<!DOCTYPE html>
<html>
<head>
    <title>Contact Us</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:linear-gradient(135deg,#1e3c72,#2a5298);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .contact-box{
            background:white;
            padding:40px;
            width:450px;
            border-radius:15px;
            box-shadow:0 10px 30px rgba(0,0,0,0.3);
            animation:fadeIn 1s ease;
        }

        .contact-box h1{
            text-align:center;
            margin-bottom:25px;
            color:#1e3c72;
        }

        input, textarea{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;
        }

        textarea{
            height:120px;
            resize:none;
        }

        button{
            width:100%;
            padding:12px;
            background:#1e3c72;
            color:white;
            border:none;
            border-radius:8px;
            font-size:18px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#2a5298;
            transform:scale(1.05);
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(-20px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }
    </style>
</head>
<body>

<div class="contact-box">
    <h1>Contact Us</h1>

    <form>
        <input type="text" placeholder="Enter Your Name" required>

        <input type="email" placeholder="Enter Your Email" required>

        <textarea placeholder="Enter Your Message"></textarea>

        <button type="submit">Send Message</button>
    </form>
</div>

</body>
</html>
