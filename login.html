<!DOCTYPE html>
<html>
<head>
    <title>College Login</title>
    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#1e3c72,#2a5298);
        }

        .login-box{
            background:white;
            padding:40px;
            width:350px;
            border-radius:20px;
            text-align:center;
            box-shadow:0 10px 25px rgba(0,0,0,0.3);
            animation:slideIn 1s;
        }

        @keyframes slideIn{
            from{
                transform:translateY(-50px);
                opacity:0;
            }
            to{
                transform:translateY(0);
                opacity:1;
            }
        }

        h2{
            color:#1e3c72;
            margin-bottom:20px;
        }

        input{
            width:90%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:8px;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#ff9800;
            color:white;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:#e68900;
        }
    </style>
</head>

<body>

<div class="login-box">
    <h2>🎓 ABC College Login</h2>

    <form action="index.html">
        <input type="text" placeholder="Username" required>
        <input type="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>
